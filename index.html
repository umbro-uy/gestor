  :root{--ac:#0A4DA3;--ac-s:#E8F0FB;--bg:#F6F7F9;--hd:#0E1B33;}
  *{box-sizing:border-box;}
  body{font-family:'Poppins',sans-serif;margin:0;}

<body>
<div id="root"></div>
<script>
function mostrarError(titulo,detalle){
  var r=document.getElementById("root");
  if(r){r.innerHTML='<div style="font-family:sans-serif;max-width:680px;margin:40px auto;padding:24px;border:2px solid #F3C2CA;background:#FCE9EC;border-radius:16px;color:#D7263D"><b style="font-size:16px">'+titulo+'</b><br><br>'+(detalle?'<code style="display:block;font-size:11px;color:#1e293b;background:#fff;padding:12px;border-radius:8px;word-break:break-word;white-space:pre-wrap">'+detalle+'</code><br>':'')+'<span style="color:#64748B;font-size:12px">Sacale una captura y pasámela.</span></div>';}
}
window.addEventListener("error",function(e){
  var src=e&&(e.filename||"");
  var isCDN=src&&src!==window.location.href&&src.indexOf(window.location.origin)===-1;
  if(isCDN||(!e.error&&e.message==="Script error.")){
    mostrarError("Error al cargar recurso externo","CDN: "+(src||"desconocido")+" | Mensaje: "+(e.message||"sin detalle"));
  } else if(e.error){
    mostrarError("Error en la app",(e.error.message||"")+" | "+(e.error.stack||"").slice(0,300));
  }
},true);
</script>

<script>
// Verificar que todos los CDNs cargaron antes de iniciar
(function(){
  var falta=[];
  if(typeof React==="undefined")falta.push("React (unpkg.com)");
  if(typeof ReactDOM==="undefined")falta.push("ReactDOM (unpkg.com)");
  if(typeof XLSX==="undefined")falta.push("XLSX (cdnjs.cloudflare.com)");
  if(typeof window.supabase==="undefined")falta.push("Supabase (cdn.jsdelivr.net)");
  if(falta.length>0){
    mostrarError("CDNs que no cargaron: "+falta.join(", "),"Verificá tu conexión a internet. Estos recursos externos son necesarios para que la app funcione.");
    return;
  }
})();
</script>
